name: mendoraci

services:
  postgres:
    image: postgres:16-alpine
    container_name: mendoraci-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./infra/data/postgres:/var/lib/postgresql/data
      - ./infra/sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mendoraci-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-13T22-19-12Z
    container_name: mendoraci-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - ./infra/data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_EVIDENCE: ${S3_BUCKET_EVIDENCE}
      S3_BUCKET_GOLDSETS: ${S3_BUCKET_GOLDSETS}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$S3_ACCESS_KEY $$S3_SECRET_KEY &&
      mc mb -p local/$$S3_BUCKET_EVIDENCE || true &&
      mc mb -p local/$$S3_BUCKET_GOLDSETS || true &&
      mc anonymous set none local/$$S3_BUCKET_EVIDENCE &&
      mc anonymous set none local/$$S3_BUCKET_GOLDSETS &&
      echo 'MinIO buckets ready'
      "

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: dev
    container_name: mendoraci-api
    env_file: .env
    environment:
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - ./package.json:/app/package.json
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 15

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: dev
    container_name: mendoraci-web
    env_file: .env
    environment:
      NODE_ENV: development
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - ./package.json:/app/package.json
    ports:
      - "3000:3000"

  test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: infra/docker/test.Dockerfile
    env_file: .env
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://mendoraci_app:${POSTGRES_PASSWORD}@postgres:5432/mendoraci_test
      API_BASE_URL: http://api:4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
