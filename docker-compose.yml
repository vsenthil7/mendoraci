name: mendoraci

services:
  postgres:
    image: postgres:16-alpine
    container_name: mendoraci-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      # CP-4b: bootstrap user is ADMIN (superuser). Migrations run as this role.
      # API runtime connects as `mendoraci_app` (non-super, no bypassrls) so RLS
      # actually enforces. The app role is created by infra/sql/01-create-app-role.sql.
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD}
    volumes:
      - ./infra/data/postgres:/var/lib/postgresql/data
      - ./infra/sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: mendoraci-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-13T22-19-12Z
    container_name: mendoraci-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - ./infra/data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_EVIDENCE: ${S3_BUCKET_EVIDENCE}
      S3_BUCKET_GOLDSETS: ${S3_BUCKET_GOLDSETS}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$S3_ACCESS_KEY $$S3_SECRET_KEY &&
      mc mb -p local/$$S3_BUCKET_EVIDENCE || true &&
      mc mb -p local/$$S3_BUCKET_GOLDSETS || true &&
      echo 'MinIO buckets ready'
      "

  api-migrate:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: dev
    container_name: mendoraci-api-migrate
    env_file:
      - .env
    environment:
      # Migrations run as ADMIN (DDL needs CREATE TABLE, ALTER, ENABLE RLS)
      DATABASE_URL: postgresql://${POSTGRES_ADMIN_USER}:${POSTGRES_ADMIN_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["pnpm", "exec", "node-pg-migrate", "up", "-m", "src/db/migrations"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: dev
    container_name: mendoraci-api
    env_file:
      - path: .env
        required: true
      - path: .env.bob
        required: false
    environment:
      NODE_ENV: development
      # API runtime: NON-SUPER `mendoraci_app` role so RLS FORCE fires.
      DATABASE_URL: postgresql://mendoraci_app:${POSTGRES_APP_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Admin URL exposed for vitest integration test pools that need to bypass
      # RLS for setup/teardown only. Not used by Fastify routes.
      DATABASE_URL_ADMIN: postgresql://${POSTGRES_ADMIN_USER}:${POSTGRES_ADMIN_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      api-migrate:
        condition: service_completed_successfully
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 15

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: dev
    container_name: mendoraci-web
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://api:4000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
      - ./apps/web/next.config.mjs:/app/apps/web/next.config.mjs
      - ./apps/web/tailwind.config.ts:/app/apps/web/tailwind.config.ts
      - ./apps/web/postcss.config.cjs:/app/apps/web/postcss.config.cjs
      - ./apps/web/tsconfig.json:/app/apps/web/tsconfig.json
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"

  test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: infra/docker/test.Dockerfile
    container_name: mendoraci-test
    env_file:
      - path: .env
        required: true
      - path: .env.bob
        required: false
    environment:
      NODE_ENV: test
      # Playwright is an HTTP black-box client; it doesn't need DB access.
      # The api container is where vitest runs (via cp2_run_integration_in_container.py),
      # and that container has its own DATABASE_URL + DATABASE_URL_ADMIN.
      DATABASE_URL: postgresql://mendoraci_app:${POSTGRES_APP_PASSWORD}@postgres:5432/${POSTGRES_DB}
      API_BASE_URL: http://api:4000
      WEB_BASE_URL: http://web:3000
      CI: "1"
    volumes:
      - ./playwright-report:/app/playwright-report
      - ./tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
